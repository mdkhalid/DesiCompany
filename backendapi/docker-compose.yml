version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: desicompany_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-desicompany}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-desicompany123}
      POSTGRES_DB: ${DB_NAME:-desicompany}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-desicompany} -d ${DB_NAME:-desicompany}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: desicompany_redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
